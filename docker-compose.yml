services:
  asterisk:
    build:
      context: .
      dockerfile: docker/asterisk/Dockerfile
    container_name: asterisk-ivr
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./generated/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./generated/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./generated/voicemail.conf:/etc/asterisk/voicemail.conf:ro
      - ./generated/logger.conf:/etc/asterisk/logger.conf:ro
      - ./generated/msmtprc:/etc/msmtprc:ro
      - ./audio:/var/lib/asterisk/sounds/custom:ro
      - ./runtime/voicemail:/var/spool/asterisk/voicemail
      - ./runtime/log:/var/log/asterisk
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show uptime"]
      interval: 30s
      timeout: 10s
      retries: 3
