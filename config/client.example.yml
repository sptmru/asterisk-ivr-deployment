client_name: sample-client

sip:
  server: sip.example.com
  username: "100100"
  password: change-me
  did: "15551234567"

ivr:
  timezone: UTC
  timeout_seconds: 30
  working_hours:
    - days: mon-fri
      start: "09:00"
      end: "18:00"
    - days: sat
      start: "10:00"
      end: "14:00"
  prompts:
    open: welcome-open.wav
    closed: welcome-closed.wav
    invalid: invalid-option.wav
  voicemail:
    email: hello@example.com
    from_name: Sample Client IVR
    from_email: ivr@example.com
    smtp:
      host: smtp.example.com
      port: 587
      username: ivr@example.com
      password: app-password
      tls: true
  options:
    - digit: "1"
      prompt: sales.wav
      action: transfer
      target: "15550101"
    - digit: "2"
      prompt: support.wav
      action: transfer
      target: "15550102"
    - digit: "3"
      prompt: voicemail.wav
      action: voicemail
